services:
  catalogo:
    build: .
    image: catalogo-tray:latest
    container_name: catalogo-tray
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persiste o banco SQLite com credenciais e categorias entre reinicializações
      - catalogo_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  catalogo_data:
    driver: local
